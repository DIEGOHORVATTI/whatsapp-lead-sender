<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#25D366"/>
      <stop offset="100%" stop-color="#128C7E"/>
    </linearGradient>
    <linearGradient id="mega" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#E8F5E9"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="1024" height="1024" rx="220" fill="url(#bg)"/>

  <!-- Megaphone body -->
  <g transform="translate(512, 512)">
    <!-- Sound waves -->
    <path d="M 200 -120 Q 310 -60, 200 0 Q 310 60, 200 120" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="28" stroke-linecap="round"/>
    <path d="M 260 -170 Q 400 -85, 260 0 Q 400 85, 260 170" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="28" stroke-linecap="round"/>
    <path d="M 320 -210 Q 480 -105, 320 0 Q 480 105, 320 210" fill="none" stroke="rgba(255,255,255,0.09)" stroke-width="28" stroke-linecap="round"/>

    <!-- Megaphone cone -->
    <path d="M -320 -50 L -320 50 Q -310 55, -280 70 L 160 200 Q 190 215, 190 185 L 190 -185 Q 190 -215, 160 -200 L -280 -70 Q -310 -55, -320 -50 Z" fill="url(#mega)" opacity="0.95"/>

    <!-- Megaphone handle/grip -->
    <rect x="-380" y="-65" width="70" height="130" rx="20" fill="rgba(255,255,255,0.85)"/>

    <!-- Megaphone opening rim -->
    <ellipse cx="190" cy="0" rx="18" ry="200" fill="rgba(255,255,255,0.7)"/>

    <!-- Small detail lines on body -->
    <line x1="-200" y1="-30" x2="100" y2="-140" stroke="rgba(18,140,126,0.12)" stroke-width="4"/>
    <line x1="-200" y1="30" x2="100" y2="140" stroke="rgba(18,140,126,0.12)" stroke-width="4"/>
  </g>
</svg>
